<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — QuizAI</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
</head>
<body>
<div class="page-wrapper" style="max-width:420px;">

    <div style="text-align:center; margin-bottom:2rem; padding-top:3rem;">
        <div style="width:56px; height:56px; background:linear-gradient(135deg,#7C3AED,#6366F1);
                    border-radius:16px; display:flex; align-items:center; justify-content:center;
                    font-size:1.6rem; margin:0 auto 1rem;">🔐</div>
        <h1 style="font-size:1.6rem; font-weight:800; background:linear-gradient(135deg,#fff,#A78BFA);
                   -webkit-background-clip:text; -webkit-text-fill-color:transparent;
                   background-clip:text; margin-bottom:0.3rem;">Admin Portal</h1>
        <p style="color:var(--text-muted); font-size:0.9rem;">QuizAI Dashboard Access</p>
    </div>

    {% if error == "wrong_password" %}
    <div style="display:flex; gap:0.6rem; align-items:center;
                background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
                border-radius:12px; padding:0.9rem 1.1rem; margin-bottom:1.25rem;
                font-size:0.875rem; color:#FCA5A5;">
        <span>🚫</span> Incorrect password. Please try again.
    </div>
    {% endif %}

    <div class="card" style="padding:2rem;">
        <form action="/admin/login" method="post">
            <div class="form-group" style="margin-bottom:1.5rem;">
                <label for="password">Admin Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Enter your password" required autofocus
                       style="width:100%;">
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="width:100%;">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                </svg>
                Sign In
            </button>
        </form>
    </div>

    <p style="text-align:center; margin-top:1.5rem; font-size:0.8rem; color:var(--text-dim);">
        <a href="/" style="color:var(--accent); text-decoration:none;">← Back to Quiz App</a>
    </p>
</div>
</body>
</html>
